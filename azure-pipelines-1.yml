trigger: none

pool:
  vmImage: 'windows-latest'

variables:
  solutionName: 'ProcurementAgentCore'

steps:
# 1. Check out the code from your GitHub repository
- checkout: self

# 2. Install the Power Platform Build Tools
- task: PowerPlatformToolInstaller@2
  displayName: 'Power Platform Tool Installer'
  inputs:
    DefaultVersion: true

# 3. Pack the raw code into a Managed Solution .zip file
- task: PowerPlatformPackSolution@2
  displayName: 'Pack Solution (Managed)'
  inputs:
    SolutionSourceFolder: '$(Build.SourcesDirectory)\$(solutionName)'
    SolutionOutputFile: '$(Build.ArtifactStagingDirectory)\$(solutionName)_managed.zip'
    SolutionType: 'Managed'

# 4. Import the Managed Solution into the Test Environment
- task: PowerPlatformImportSolution@2
  displayName: 'Import to Test Environment'
  inputs:
    authenticationType: 'PowerPlatformSPN'
    PowerPlatformSPN: 'PowerApps-Test' # Make sure this matches your new connection name
    SolutionInputFile: '$(Build.ArtifactStagingDirectory)\$(solutionName)_managed.zip'
    AsyncOperation: true
    MaxAsyncWaitTime: '60'