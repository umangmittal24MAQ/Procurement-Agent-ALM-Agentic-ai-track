trigger: none

pool:
  vmImage: 'windows-latest'

variables:
  solutionName: 'ProcurementAgentCore'

jobs:
# ==========================================
# STAGE 1: DEPLOY TO TEST
# ==========================================
- job: DeployToTest
  displayName: 'Deploy to Test Environment'
  steps:
  - checkout: self
  
  - task: PowerPlatformToolInstaller@2
    displayName: 'Power Platform Tool Installer'
    inputs:
      DefaultVersion: true
      
  - task: PowerPlatformPackSolution@2
    displayName: 'Pack Solution (Unmanaged)'
    inputs:
      SolutionSourceFolder: '$(Build.SourcesDirectory)\$(solutionName)'
      SolutionOutputFile: '$(Build.ArtifactStagingDirectory)\$(solutionName)_unmanaged.zip'
      SolutionType: 'Unmanaged'
      
  - task: PowerPlatformImportSolution@2
    displayName: 'Import to Test'
    inputs:
      authenticationType: 'PowerPlatformSPN'
      PowerPlatformSPN: 'PowerApps-Test' 
      SolutionInputFile: '$(Build.ArtifactStagingDirectory)\$(solutionName)_unmanaged.zip'
      AsyncOperation: true
      MaxAsyncWaitTime: '60'

# ==========================================
# STAGE 2: DEPLOY TO PROD (REQUIRES APPROVAL)
# ==========================================
- job: DeployToProd
  displayName: 'Deploy to Production Environment'
  dependsOn: DeployToTest # This tells it to wait for Test to finish first
  steps:
  - checkout: self
  
  - task: PowerPlatformToolInstaller@2
    displayName: 'Power Platform Tool Installer'
    inputs:
      DefaultVersion: true
      
  - task: PowerPlatformPackSolution@2
    displayName: 'Pack Solution (Unmanaged)'
    inputs:
      SolutionSourceFolder: '$(Build.SourcesDirectory)\$(solutionName)'
      SolutionOutputFile: '$(Build.ArtifactStagingDirectory)\$(solutionName)_unmanaged.zip'
      SolutionType: 'Unmanaged'
      
  - task: PowerPlatformImportSolution@2
    displayName: 'Import to Prod'
    inputs:
      authenticationType: 'PowerPlatformSPN'
      PowerPlatformSPN: 'PowerApps-Prod' # This connection triggers your manual lock!
      SolutionInputFile: '$(Build.ArtifactStagingDirectory)\$(solutionName)_unmanaged.zip'
      AsyncOperation: true
      MaxAsyncWaitTime: '60'